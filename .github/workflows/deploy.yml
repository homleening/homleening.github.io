name: Hexo Auto Deploy
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Clean and Build
        run: |
          npx hexo clean
          npm run build

      - name: Check public directory
        run: |
          echo "=== Checking public directory ==="
          ls -la public/ || echo "Public directory not found"
          if [ -d "public" ]; then
            echo "=== Public CSS files ==="
            find public -name "*.css" -type f
            echo "=== Public directory structure ==="
            find public -type d | head -20
          fi

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          # 用系统内置 token，同仓库无需手动 PAT
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true